<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jumper Mochileiro | Paris Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            background-color: #000;
            color: #fff;
        }

        /* Fundo principal com imagem de Paris e desfoque */
        .bg-image {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://images.unsplash.com/photo-1502602898657-3e91760cbb34?auto=format&fit=crop&q=80&w=1200');
            background-size: cover;
            background-position: center;
            filter: blur(12px) brightness(0.35);
            z-index: -1;
            transform: scale(1.1);
        }

        .glass-dark {
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .link-card {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .link-card:hover {
            background: rgba(255, 255, 255, 1);
            color: #000;
            transform: translateY(-3px) scale(1.02);
        }

        .profile-border {
            border: 3px solid #fff;
            padding: 4px;
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
        }

        /* Botão VIP com imagem desfocada interna */
        .catarse-btn {
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: all 0.4s ease;
        }

        .catarse-btn::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&q=80&w=800');
            background-size: cover;
            background-position: center;
            filter: blur(4px) brightness(0.5);
            z-index: -1;
            transition: transform 0.6s ease;
        }

        .catarse-btn:hover::before {
            transform: scale(1.1);
            filter: blur(2px) brightness(0.7);
        }

        .catarse-btn:hover {
            border-color: #fff;
            transform: translateY(-3px) scale(1.02);
        }

        .highlight-circle {
            transition: all 0.3s ease;
        }

        .highlight-circle:hover {
            transform: scale(1.1);
            background: rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>

    <div class="bg-image"></div>

    <!-- Container Principal -->
    <div class="w-full max-w-md flex flex-col items-center p-6 z-10">
        
        <!-- Perfil -->
        <div class="mt-12 mb-10 text-center">
            <div class="relative w-32 h-32 mb-6 mx-auto rounded-full profile-border overflow-hidden bg-zinc-900">
                <!-- No seu GitHub, o arquivo deve se chamar exatamente: perfil.jpg -->
                <img src="perfil.jpg" alt="Jumper Mochileiro" class="w-full h-full object-cover" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                
                <!-- Fallback: Este ícone só aparece se a imagem falhar -->
                <div class="hidden w-full h-full flex items-center justify-center text-white text-5xl bg-zinc-800">
                    <i class="fas fa-user opacity-30"></i>
                </div>
            </div>
            <h1 class="text-3xl font-black tracking-tighter uppercase italic">jumpermochileiro</h1>
            <div class="mt-2 text-[10px] uppercase tracking-[0.4em] opacity-50 font-bold italic">Jumper</div>
        </div>

        <!-- Destaques -->
        <div class="flex justify-center space-x-12 w-full mb-12 opacity-90 text-center">
            <a href="https://youtu.be/PWNALyjmpjs?si=2m39hiol9z03Wi1X" target="_blank" class="flex flex-col items-center group">
                <div class="w-16 h-16 rounded-full border border-white/20 flex items-center justify-center mb-2 bg-black/40 highlight-circle">
                    <i class="fas fa-video text-xl group-hover:text-white transition-colors"></i>
                </div>
                <span class="text-[10px] uppercase tracking-widest font-bold">Voa</span>
            </a>
            
            <a href="https://vsco.co/jumpeer/gallery" target="_blank" class="flex flex-col items-center group">
                <div class="w-16 h-16 rounded-full border border-white/20 flex items-center justify-center mb-2 bg-black/40 highlight-circle">
                    <i class="fas fa-camera-retro text-xl group-hover:text-white transition-colors"></i>
                </div>
                <span class="text-[10px] uppercase tracking-widest font-bold">Fotos</span>
            </a>
        </div>

        <!-- Links Principais -->
        <div class="w-full space-y-4">
            
            <a href="https://youtu.be/PWNALyjmpjs?si=2m39hiol9z03Wi1X" target="_blank" class="glass-dark link-card w-full py-5 px-6 rounded-2xl flex items-center justify-center font-bold text-center uppercase tracking-widest text-[11px]">
                <i class="fab fa-youtube mr-3 text-lg text-red-500"></i> Assista ao Último Vídeo
            </a>

            <a href="https://www.catarse.me/viagempelaamericadosul" target="_blank" class="catarse-btn w-full py-7 px-6 rounded-3xl flex flex-col items-center justify-center shadow-2xl">
                <span class="uppercase tracking-[0.3em] text-[9px] font-black mb-1 text-blue-400">Acesso VIP Polarsteps</span>
                <span class="text-sm font-bold uppercase text-center mb-2">Notas de Viagem Exclusivas</span>
                <div class="mt-2 bg-white text-black px-5 py-1.5 rounded-full text-[11px] font-black uppercase tracking-tighter">
                    R$ 30,00 / mês
                </div>
            </a>

            <a href="https://wa.me/5584986448097" target="_blank" class="glass-dark link-card w-full py-5 px-6 rounded-2xl flex items-center justify-center font-bold text-center uppercase tracking-widest text-[11px]">
                <i class="fab fa-whatsapp mr-3 text-lg text-green-500"></i> Trabalhe Comigo / Parcerias
            </a>

        </div>

        <!-- Redes Sociais -->
        <div class="mt-16 flex space-x-10 opacity-40 hover:opacity-100 transition-opacity">
            <a href="https://instagram.com/jumpermochileiro" target="_blank" class="text-xl hover:scale-125 transform transition-transform">
                <i class="fab fa-instagram"></i>
            </a>
            <a href="#" target="_blank" class="text-xl hover:scale-125 transform transition-transform">
                <i class="fab fa-tiktok"></i>
            </a>
            <a href="https://youtu.be/PWNALyjmpjs?si=2m39hiol9z03Wi1X" target="_blank" class="text-xl hover:scale-125 transform transition-transform">
                <i class="fab fa-youtube"></i>
            </a>
        </div>

        <footer class="mt-20 pb-10 text-center opacity-20">
            <p class="text-[8px] uppercase tracking-[0.5em] font-bold">Jumper Mochileiro • 2026</p>
        </footer>

    </div>

</body>
</html>
