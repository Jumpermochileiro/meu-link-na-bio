<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jumper Mochileiro | Paris Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            background-color: #000;
            color: #fff;
        }

        /* Fundo principal com imagem de Paris e desfoque */
        .bg-image {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://images.unsplash.com/photo-1502602898657-3e91760cbb34?auto=format&fit=crop&q=80&w=1200');
            background-size: cover;
            background-position: center;
            filter: blur(12px) brightness(0.35);
            z-index: -1;
            transform: scale(1.1);
        }

        .glass-dark {
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .link-card {
            transition: all 0.3s ease;
        }

        .link-card:hover {
            background: rgba(255, 255, 255, 1);
            color: #000;
            transform: scale(1.02);
        }

        .profile-border {
            border: 2px solid #fff;
            padding: 3px;
        }

        /* Botão VIP com imagem desfocada interna */
        .catarse-btn {
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: all 0.3s ease;
        }

        .catarse-btn::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&q=80&w=800');
            background-size: cover;
            background-position: center;
            filter: blur(4px) brightness(0.5);
            z-index: -1;
            transition: transform 0.5s ease;
        }

        .catarse-btn:hover::before {
            transform: scale(1.1);
            filter: blur(2px) brightness(0.7);
        }

        .catarse-btn:hover {
            border-color: #fff;
            transform: scale(1.02);
        }

        .highlight-circle {
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .highlight-circle:hover {
            transform: scale(1.1);
            border-color: rgba(255,255,255,1);
        }
    </style>
</head>
<body>

    <div class="bg-image"></div>

    <!-- Container Principal -->
    <div class="w-full max-w-md flex flex-col items-center p-6 z-10">
        
        <!-- Perfil -->
        <div class="mt-8 mb-8 text-center">
            <div class="relative w-28 h-28 mb-4 mx-auto rounded-full profile-border overflow-hidden bg-gray-900 shadow-2xl">
                <!-- Ícone de substituição - Pode ser trocado pela sua foto real -->
                <div class="w-full h-full flex items-center justify-center text-white text-5xl">
                    <i class="fas fa-user"></i>
                </div>
            </div>
            <h1 class="text-2xl font-bold tracking-tight">jumpermochileiro</h1>
            <div class="mt-2 text-xs uppercase tracking-widest opacity-70 font-semibold italic">Jumper</div>
            
            <!-- Espaço removido conforme solicitado: Pin, Brasil, Bandeira e Contagem -->
        </div>

        <!-- Destaques -->
        <div class="flex justify-center space-x-12 w-full mb-10 opacity-90 text-center">
            <!-- Destaque Voa (Drone) -->
            <a href="LINK_PLAYLIST_DRONE_YOUTUBE" target="_blank" class="flex flex-col items-center group">
                <div class="w-16 h-16 rounded-full border border-white/20 flex items-center justify-center mb-2 bg-black/40 highlight-circle">
                    <i class="fas fa-video text-xl group-hover:text-white transition-colors"></i>
                </div>
                <span class="text-[10px] uppercase tracking-widest font-bold">Voa</span>
            </a>
            
            <!-- Destaque Fotos (VSCO) -->
            <a href="https://vsco.co/jumpeer/gallery" target="_blank" class="flex flex-col items-center group">
                <div class="w-16 h-16 rounded-full border border-white/20 flex items-center justify-center mb-2 bg-black/40 highlight-circle">
                    <i class="fas fa-camera-retro text-xl group-hover:text-white transition-colors"></i>
                </div>
                <span class="text-[10px] uppercase tracking-widest font-bold">Fotos</span>
            </a>
        </div>

        <!-- Links Principais -->
        <div class="w-full space-y-4">
            
            <!-- Link do YouTube -->
            <a href="https://youtu.be/PWNALyjmpjs?si=2m39hiol9z03Wi1X" target="_blank" class="glass-dark link-card w-full py-4 px-6 rounded-xl flex items-center justify-center font-bold text-center uppercase tracking-widest text-xs">
                <i class="fab fa-youtube mr-3 text-lg text-red-500"></i> Assista ao Último Vídeo
            </a>

            <!-- Link do Catarse com Fundo Desfocado -->
            <a href="URL_DO_SEU_CHECKOUT_NO_CATARSE" target="_blank" class="catarse-btn w-full py-6 px-6 rounded-xl flex flex-col items-center justify-center shadow-2xl">
                <span class="uppercase tracking-[0.2em] text-xs font-black">Acesso VIP Polarsteps</span>
                <span class="text-[10px] font-medium opacity-90 mt-1 uppercase text-center">Dicas, Roteiros e Notas de Viagem Exclusivas</span>
                <div class="mt-3 bg-white text-black px-4 py-1.5 rounded-full text-[11px] font-black uppercase tracking-tighter">
                    R$ 29,90 / mês
                </div>
            </a>

            <!-- WhatsApp Atualizado -->
            <a href="https://wa.me/5584986448097" target="_blank" class="glass-dark link-card w-full py-4 px-6 rounded-xl flex items-center justify-center font-semibold text-center uppercase tracking-widest text-xs">
                <i class="fab fa-whatsapp mr-3 text-lg text-green-500"></i> Trabalhe Comigo / Parcerias
            </a>

        </div>

        <!-- Redes Sociais -->
        <div class="mt-12 flex space-x-8 opacity-50">
            <a href="https://instagram.com/jumpermochileiro" target="_blank" class="text-xl hover:opacity-100 transition-opacity hover:scale-110 transform">
                <i class="fab fa-instagram"></i>
            </a>
            <a href="#" target="_blank" class="text-xl hover:opacity-100 transition-opacity hover:scale-110 transform">
                <i class="fab fa-tiktok"></i>
            </a>
            <a href="https://youtu.be/PWNALyjmpjs?si=2m39hiol9z03Wi1X" target="_blank" class="text-xl hover:opacity-100 transition-opacity hover:scale-110 transform">
                <i class="fab fa-youtube"></i>
            </a>
        </div>

        <!-- Rodapé -->
        <footer class="mt-16 pb-10 text-center opacity-30">
            <p class="text-[9px] uppercase tracking-[0.3em]">Jumper Mochileiro &copy; 2026</p>
        </footer>

    </div>

</body>
</html>
