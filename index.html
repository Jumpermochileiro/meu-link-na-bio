<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jumper | Paris Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            background-color: #000;
            color: #fff;
        }

        /* Fundo principal com imagem de Paris e desfoque */
        .bg-image {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://images.unsplash.com/photo-1502602898657-3e91760cbb34?auto=format&fit=crop&q=80&w=1200');
            background-size: cover;
            background-position: center;
            filter: blur(12px) brightness(0.35);
            z-index: -1;
            transform: scale(1.1);
            will-change: transform;
        }

        .glass-dark {
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .link-card {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .link-card:hover {
            background: rgba(255, 255, 255, 1);
            color: #000;
            transform: translateY(-3px) scale(1.02);
        }

        .profile-border {
            border: 3px solid #fff;
            padding: 4px;
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
        }

        /* Botão VIP com imagem desfocada interna */
        .catarse-btn {
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: all 0.4s ease;
        }

        .catarse-btn::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&q=80&w=800');
            background-size: cover;
            background-position: center;
            filter: blur(4px) brightness(0.5);
            z-index: -1;
            transition: transform 0.6s ease;
        }

        .catarse-btn:hover::before {
            transform: scale(1.1);
            filter: blur(2px) brightness(0.7);
        }

        .catarse-btn:hover {
            border-color: #fff;
            transform: translateY(-3px) scale(1.02);
        }

        .highlight-circle {
            transition: all 0.3s ease;
        }

        .highlight-circle:hover {
            transform: scale(1.1);
            background: rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>

    <div class="bg-image" id="bg"></div>

    <!-- Container Principal -->
    <div class="w-full max-w-md flex flex-col items-center p-6 z-10">
        
        <!-- Perfil -->
        <div class="mt-12 mb-10 text-center">
            <div class="relative w-32 h-32 mb-6 mx-auto rounded-full profile-border overflow-hidden bg-zinc-900">
                <!-- No seu GitHub, o ficheiro deve chamar-se perfil.jpg -->
                <img src="perfil.jpg" alt="Jumper" class="w-full h-full object-cover" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                
                <!-- Fallback caso a imagem não carregue -->
                <div class="hidden w-full h-full flex items-center justify-center text-white text-5xl bg-zinc-800">
                    <i class="fas fa-user opacity-30"></i>
                </div>
            </div>
            <!-- Nome simplificado para "Jumper" com espaçamento elegante -->
            <h1 class="text-4xl font-black uppercase italic tracking-[0.3em] text-white">Jumper</h1>
        </div>

        <!-- Destaques -->
        <div class="flex justify-center space-x-12 w-full mb-12 opacity-90 text-center">
            <!-- Destaque Voa (Drone estilo DJI) -->
            <a href="https://youtu.be/PWNALyjmpjs?si=2m39hiol9z03Wi1X" target="_blank" class="flex flex-col items-center group">
                <div class="w-16 h-16 rounded-full border border-white/20 flex items-center justify-center mb-2 bg-black/40 highlight-circle">
                    <!-- Ícone de Drone Quadricóptero Moderno -->
                    <svg class="w-10 h-10 text-white fill-current" viewBox="0 0 24 24">
                        <rect x="10" y="9" width="4" height="6" rx="1" />
                        <path d="M10 10L6 7" stroke="currentColor" stroke-width="1.5" />
                        <circle cx="5" cy="6" r="1.5" fill="none" stroke="currentColor" stroke-width="1"/>
                        <path d="M14 10L18 7" stroke="currentColor" stroke-width="1.5" />
                        <circle cx="19" cy="6" r="1.5" fill="none" stroke="currentColor" stroke-width="1"/>
                        <path d="M10 14L6 17" stroke="currentColor" stroke-width="1.5" />
                        <circle cx="5" cy="18" r="1.5" fill="none" stroke="currentColor" stroke-width="1"/>
                        <path d="M14 14L18 17" stroke="currentColor" stroke-width="1.5" />
                        <circle cx="19" cy="18" r="1.5" fill="none" stroke="currentColor" stroke-width="1"/>
                        <circle cx="12" cy="16" r="1.2" fill="currentColor" />
                    </svg>
                </div>
                <span class="text-[10px] uppercase tracking-widest font-bold">Voa</span>
            </a>
            
            <!-- Link do VSCO Atualizado -->
            <a href="https://jumpeer.vsco.site" target="_blank" class="flex flex-col items-center group">
                <div class="w-16 h-16 rounded-full border border-white/20 flex items-center justify-center mb-2 bg-black/40 highlight-circle">
                    <i class="fas fa-camera-retro text-xl group-hover:text-white transition-colors"></i>
                </div>
                <span class="text-[10px] uppercase tracking-widest font-bold">Fotos</span>
            </a>
        </div>

        <!-- Links Principais -->
        <div class="w-full space-y-4">
            
            <a href="https://youtu.be/PWNALyjmpjs?si=2m39hiol9z03Wi1X" target="_blank" class="glass-dark link-card w-full py-5 px-6 rounded-2xl flex items-center justify-center font-bold text-center uppercase tracking-widest text-[11px]">
                <i class="fab fa-youtube mr-3 text-lg text-red-500"></i> Assista ao Último Vídeo
            </a>

            <a href="https://www.catarse.me/viagempelaamericadosul" target="_blank" class="catarse-btn w-full py-7 px-6 rounded-3xl flex flex-col items-center justify-center shadow-2xl">
                <span class="uppercase tracking-[0.3em] text-[9px] font-black mb-1 text-blue-400">Acesso VIP Polarsteps</span>
                <span class="text-sm font-bold uppercase text-center mb-2">Notas de Viagem Exclusivas</span>
                <div class="mt-2 bg-white text-black px-5 py-1.5 rounded-full text-[11px] font-black uppercase tracking-tighter">
                    R$ 30,00 / mês
                </div>
            </a>

            <a href="https://wa.me/5584986448097" target="_blank" class="glass-dark link-card w-full py-5 px-6 rounded-2xl flex items-center justify-center font-bold text-center uppercase tracking-widest text-[11px]">
                <i class="fab fa-whatsapp mr-3 text-lg text-green-500"></i> Trabalhe Comigo / Parcerias
            </a>

        </div>

        <!-- Rodapé Minimalista -->
        <footer class="mt-24 pb-10 text-center opacity-20">
            <p class="text-[8px] uppercase tracking-[0.5em] font-bold">Jumper • 2026</p>
        </footer>

    </div>

    <script>
        // Lógica de Scroll e Animação de Revelação
        window.addEventListener('scroll', () => {
            const scrolled = window.pageYOffset;
            const bg = document.getElementById('bg');
            if(bg) bg.style.transform = `scale(${1.1 + scrolled * 0.0005})`;
        });
    </script>
</body>
</html>
